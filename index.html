<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mastery</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f7f4;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.1);
      --text-primary: #1a1a18;
      --text-secondary: #5f5e5a;
      --text-muted: #9c9b96;
      --accent: #1a1a18;
      --radius: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #161614;
        --surface: #1e1e1c;
        --border: rgba(255,255,255,0.08);
        --text-primary: #e8e7e2;
        --text-secondary: #9c9b96;
        --text-muted: #5f5e5a;
        --accent: #e8e7e2;
      }
    }

    body {
      font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', ui-monospace, monospace;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 3rem 1.5rem;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 0.5px solid var(--border);
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 24px;
      font-weight: 500;
      color: var(--text-primary);
    }

    /* ─── Grid ─── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .card {
      background: var(--surface);
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      text-decoration: none;
      transition: background 0.12s ease;
    }

    .card:hover {
      background: var(--bg);
    }

    .card-tag {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .card-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .card-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.6;
      flex: 1;
    }

    .card-link {
      margin-top: 0.75rem;
      font-size: 11px;
      color: var(--text-muted);
    }

    footer {
      margin-top: 2.5rem;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <p class="label">maxubrq / mastery</p>
      <h1>Learning dashboards</h1>
    </header>

    <div class="grid" id="grid"></div>

    <footer>github.io/mastery</footer>
  </div>

  <script>
    /*
     * ─────────────────────────────────────────
     *  Thêm page mới: chỉ cần thêm object vào array này.
     *
     *  {
     *    tag:  "category",        // hiện nhỏ ở trên, phân loại
     *    name: "Page title",      // tên hiển thị
     *    desc: "Short blurb.",    // mô tả ngắn
     *    href: "filename.html"    // tên file trong repo
     *  }
     * ─────────────────────────────────────────
     */
    const pages = [
      {
        tag: "engineering",
        name: "90-day engineer",
        desc: "Structured ramp-up plan for new engineers joining a team.",
        href: "90day-engineer.html"
      },
      {
        tag: "writing",
        name: "90-day writer",
        desc: "Daily writing habit tracker and practice roadmap.",
        href: "90days-writer.html"
      },
      {
        tag: "language",
        name: "IELTS roadmap",
        desc: "90-day IELTS preparation and study plan.",
        href: "ielts-90day-roadmap.html"
      },
      {
        tag: "language",
        name: "90Days English for SWE",
        desc: "90-day English for Software Engineer - Interview and Workplace",
        href: "90days-english-for-swe.html"
      }
    ];

    const grid = document.getElementById("grid");

    pages.forEach(p => {
      const a = document.createElement("a");
      a.className = "card";
      a.href = p.href;
      a.innerHTML = `
        <span class="card-tag">${p.tag}</span>
        <span class="card-name">${p.name}</span>
        <span class="card-desc">${p.desc}</span>
        <span class="card-link">open →</span>
      `;
      grid.appendChild(a);
    });
  </script>
</body>
</html>
