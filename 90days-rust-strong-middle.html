<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rust 90 — Strong Middle Roadmap</title>
<style>
:root{
  --bg:#16140f; --bg-soft:#1d1a14; --panel:#211d16; --panel-2:#272219;
  --line:#3a3327; --line-soft:#2a261d;
  --text:#ece5d6; --text-dim:#a89e8a; --text-faint:#6e6555;
  --rust:#d4682e; --rust-soft:#3d2a1c; --rust-glow:#e8853f;
  --p1:#7f9a72; --p1-soft:#23291f;
  --p2:#5b8fa8; --p2-soft:#1c252a;
  --p3:#c9774a; --p3-soft:#2b211a;
  --p4:#b8678f; --p4-soft:#2a2026;
  --done:#7f9a72; --font-serif:Georgia,'Iowan Old Style','Palatino Linotype',serif;
  --font-mono:'SF Mono',Consolas,'Liberation Mono',Menlo,monospace;
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box;}
body{
  margin:0; background:var(--bg); color:var(--text);
  font-family:var(--font-sans); font-size:15px; line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
.app{max-width:920px;margin:0 auto;padding:0 20px 80px;}

/* ---------- Header ---------- */
.header{padding:36px 0 24px;border-bottom:1px solid var(--line);}
.eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--rust-glow);margin:0 0 10px;}
.h1{font-family:var(--font-serif);font-size:32px;font-weight:400;margin:0 0 8px;color:var(--text);}
.h1 em{color:var(--rust-glow);font-style:normal;}
.subhead{color:var(--text-dim);font-size:14px;margin:0;max-width:560px;}

/* ---------- Stats bar ---------- */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);margin:24px 0;border-radius:4px;overflow:hidden;}
.stat{background:var(--panel);padding:16px 14px;}
.stat-num{font-family:var(--font-serif);font-size:26px;color:var(--text);line-height:1;}
.stat-label{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;margin-top:6px;}

/* ---------- Phase progress ---------- */
.phasebar{display:flex;gap:3px;margin:20px 0 28px;}
.phaseseg{flex:1;height:6px;border-radius:2px;background:var(--line-soft);position:relative;overflow:hidden;}
.phaseseg-fill{height:100%;border-radius:2px;transition:width .4s ease;}
.phase-labels{display:flex;gap:3px;margin-top:6px;}
.phase-labels span{flex:1;font-size:10.5px;color:var(--text-faint);font-family:var(--font-mono);text-align:left;}

/* ---------- Tabs ---------- */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:24px;}
.tab{background:none;border:none;color:var(--text-dim);font-family:var(--font-sans);font-size:13.5px;padding:10px 14px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--rust-glow);border-bottom-color:var(--rust);}

/* ---------- Filters (today view) ---------- */
.filters{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.filter-btn{background:var(--panel);border:1px solid var(--line);color:var(--text-dim);font-size:12px;padding:6px 12px;border-radius:14px;cursor:pointer;font-family:var(--font-mono);}
.filter-btn:hover{border-color:var(--text-faint);}
.filter-btn.active{background:var(--rust-soft);border-color:var(--rust);color:var(--rust-glow);}

/* ---------- Day card ---------- */
.daylist{display:flex;flex-direction:column;gap:10px;}
.daycard{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:16px 18px;position:relative;}
.daycard.done{opacity:0.55;}
.daycard.milestone{border-color:var(--rust);background:linear-gradient(180deg,var(--rust-soft),var(--panel) 40%);}
.daycard.today{border-color:var(--rust-glow);box-shadow:0 0 0 1px var(--rust-glow) inset;}

.daycard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.daycard-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.daynum{font-family:var(--font-mono);font-size:12px;color:var(--text-faint);min-width:46px;}
.daytype{font-family:var(--font-mono);font-size:10.5px;text-transform:uppercase;letter-spacing:0.05em;padding:2px 8px;border-radius:10px;}
.daytype.concept{background:var(--p2-soft);color:var(--p2);}
.daytype.build{background:var(--p1-soft);color:var(--p1);}
.daytype.lab{background:var(--p3-soft);color:var(--p3);}
.daytype.light{background:var(--line-soft);color:var(--text-faint);}
.dayeffort{font-size:11px;color:var(--text-faint);font-family:var(--font-mono);}
.daytitle{font-family:var(--font-serif);font-size:18px;color:var(--text);margin:10px 0 4px;}
.daycard.done .daytitle{text-decoration:line-through;text-decoration-color:var(--text-faint);}

.checkbtn{appearance:none;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--line);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--bg);}
.checkbtn.checked{background:var(--done);border-color:var(--done);}
.checkbtn svg{width:13px;height:13px;display:none;}
.checkbtn.checked svg{display:block;}

.tasklist{margin:12px 0 0;padding:0;list-style:none;}
.taskitem{display:flex;align-items:flex-start;gap:9px;padding:5px 0;font-size:13.5px;color:var(--text-dim);}
.taskitem input[type=checkbox]{margin-top:3px;width:14px;height:14px;accent-color:var(--rust);flex-shrink:0;cursor:pointer;}
.taskitem.checked label{color:var(--text-faint);text-decoration:line-through;}
.taskitem label{cursor:pointer;}

.daynotes{margin-top:10px;font-size:13px;color:var(--p3);font-style:italic;border-left:2px solid var(--p3-soft);padding-left:10px;}
.dayres{margin-top:12px;display:flex;flex-wrap:wrap;gap:8px;}
.dayres a{font-size:12px;color:var(--p2);text-decoration:none;border:1px solid var(--p2-soft);padding:3px 9px;border-radius:10px;}
.dayres a:hover{border-color:var(--p2);}

.notefield{width:100%;margin-top:12px;background:var(--bg-soft);border:1px solid var(--line-soft);border-radius:4px;color:var(--text-dim);font-size:13px;font-family:var(--font-sans);padding:8px 10px;resize:vertical;min-height:36px;}
.notefield::placeholder{color:var(--text-faint);}

.milestone-tag{font-family:var(--font-mono);font-size:10.5px;color:var(--rust-glow);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;}

/* ---------- Milestone view ---------- */
.mscard{background:var(--panel);border:1px solid var(--rust);border-radius:6px;padding:22px 24px;margin-bottom:18px;background:linear-gradient(180deg,var(--rust-soft),var(--panel) 55%);}
.mscard-day{font-family:var(--font-mono);font-size:11px;color:var(--rust-glow);text-transform:uppercase;letter-spacing:0.08em;}
.mscard-title{font-family:var(--font-serif);font-size:21px;margin:6px 0 14px;}
.mscriteria{list-style:none;margin:0;padding:0;}
.mscriteria li{display:flex;gap:9px;align-items:flex-start;padding:6px 0;font-size:14px;color:var(--text-dim);}
.mscriteria input{margin-top:3px;width:14px;height:14px;accent-color:var(--rust);cursor:pointer;}
.mscriteria li.checked label{color:var(--text-faint);text-decoration:line-through;}

/* ---------- Resources view ---------- */
.rescat{margin-bottom:26px;}
.rescat h3{font-family:var(--font-serif);font-size:16px;color:var(--rust-glow);margin:0 0 10px;font-weight:400;}
.reslist{list-style:none;margin:0;padding:0;}
.reslist li{padding:7px 0;border-bottom:1px solid var(--line-soft);font-size:13.5px;}
.reslist a{color:var(--p2);text-decoration:none;}
.reslist a:hover{text-decoration:underline;}
.reslist .restag{color:var(--text-faint);font-size:11.5px;font-family:var(--font-mono);margin-left:8px;}

/* ---------- Footer controls ---------- */
.controls{display:flex;gap:10px;margin-top:36px;padding-top:20px;border-top:1px solid var(--line);}
.ctrlbtn{background:var(--panel);border:1px solid var(--line);color:var(--text-dim);font-size:12.5px;padding:8px 14px;border-radius:5px;cursor:pointer;font-family:var(--font-sans);}
.ctrlbtn:hover{border-color:var(--text-faint);color:var(--text);}
.ctrlbtn.danger:hover{border-color:#a85d5d;color:#d98c8c;}
input[type=file]{display:none;}

.emptystate{text-align:center;padding:60px 20px;color:var(--text-faint);}
.emptystate .ti{font-size:32px;margin-bottom:12px;display:block;}

@media (max-width:640px){
  .stats{grid-template-columns:repeat(2,1fr);}
  .h1{font-size:26px;}
  .phase-labels span{font-size:9px;}
}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <p class="eyebrow">Track cá nhân &middot; 90 ngày &middot; Production-grade</p>
    <h1 class="h1">Rust <em>Strong Middle</em> Roadmap</h1>
    <p class="subhead">Từ ownership reflexes đến distributed KV store với Raft thật. Capstone xuyên suốt, không tutorial rời rạc.</p>
  </div>

  <div class="stats" id="statsBar"></div>
  <div class="phasebar" id="phaseBar"></div>
  <div class="phase-labels" id="phaseLabels"></div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="today">Hôm nay</button>
    <button class="tab" data-tab="all">Toàn bộ 90 ngày</button>
    <button class="tab" data-tab="milestones">Milestones</button>
    <button class="tab" data-tab="resources">Resources</button>
  </div>

  <div id="viewToday"></div>
  <div id="viewAll" style="display:none;"></div>
  <div id="viewMilestones" style="display:none;"></div>
  <div id="viewResources" style="display:none;"></div>

  <div class="controls">
    <button class="ctrlbtn" id="exportBtn">Xuất dữ liệu (JSON)</button>
    <button class="ctrlbtn" id="importBtn">Nhập dữ liệu</button>
    <input type="file" id="importFile" accept=".json">
    <button class="ctrlbtn danger" id="resetBtn">Reset tiến trình</button>
  </div>

</div>

<script>
const PHASES = [{"id":1,"name":"Ownership Reflexes","range":[1,18],"color":"purple","goal":"Borrow checker stops being confusing — becomes just slower."},{"id":2,"name":"Idiomatic Rust & Traits","range":[19,40],"color":"teal","goal":"Write Rust that looks like Rust, not translated Go."},{"id":3,"name":"Concurrency & Async","range":[41,65],"color":"coral","goal":"The hardest phase. Ties directly into distributed systems track."},{"id":4,"name":"Production Depth & Capstone","range":[66,90],"color":"pink","goal":"Raft consensus, observability, performance. The proof-of-work."}];
const MILESTONES = [{"day":18,"title":"Milestone 1 — KV store v0.1","phase":1,"criteria":["Compiles clean, passes all tests","Zero .clone() calls used just to dodge the borrow checker","Can explain every lifetime annotation in the code out loud","Get/set/delete works via CLI on in-memory HashMap"]},{"day":40,"title":"Milestone 2 — KV store v0.2","phase":2,"criteria":["Durable: survives process restart via WAL","StorageEngine trait with 2 working implementations","Test coverage on all core read/write paths","Can defend every Box<dyn Trait> vs generic choice in the code"]},{"day":65,"title":"Milestone 3 — KV store v0.3","phase":3,"criteria":["Async TCP server handling concurrent clients","Basic leader-follower replication works over the network","Survives a concurrent load test with zero data races","Send/Sync bounds understood, not just satisfied by accident"]},{"day":90,"title":"Capstone — Distributed KV store with Raft","phase":4,"criteria":["Leader election works across a simulated multi-node cluster","Log replication (AppendEntries) implemented and correct","Survives node crash + restart without losing committed entries","Has structured logging and at least one benchmark with real numbers","README + architecture doc exist, written for a stranger to read"]}];
const DAYS = [{"d":1,"phase":1,"type":"concept","effort":"light","title":"Setup + cargo + first program","tasks":["Install rustup, cargo, rust-analyzer in your editor","Run `cargo new kv-store --bin`, commit empty skeleton to git","Read \"Getting Started\" + \"Programming a Guessing Game\" in the Rust Book","Write a throwaway program: read a number, print its factorial"],"resources":[["The Rust Book ch.1-2","https://doc.rust-lang.org/book/ch01-00-getting-started.html"]],"notes":"This is the seed repo for the entire 90 days. Don't skip the git commit."},{"d":2,"phase":1,"type":"concept","effort":"deep","title":"Stack vs heap, move semantics","tasks":["Read Rust Book ch.4.1 (Ownership)","Write 5 tiny snippets that intentionally fail to move/borrow correctly — read every compiler error fully before fixing","Compare mentally to Go: GC walks a graph at runtime; Rust proves ownership at compile time. Write 3 sentences in your own words on this difference"],"resources":[["The Rust Book ch.4.1","https://doc.rust-lang.org/book/ch04-01-what-is-ownership.html"]],"notes":"The compiler errors ARE the lesson. Do not look up fixes until you've tried to reason about each one yourself for 5 min."},{"d":3,"phase":1,"type":"lab","effort":"deep","title":"Ownership lab — break it on purpose","tasks":["Exercise: write a function that takes a String, modifies it, and tries to use the original after — explain why it fails","Exercise: fix it 3 different ways (clone, borrow, return ownership) — list the tradeoff of each","Do Rustlings exercises: move_semantics1 through move_semantics6"],"resources":[["Rustlings","https://github.com/rust-lang/rustlings"]],"notes":"Goal today: you can predict a move/borrow error before the compiler tells you."},{"d":4,"phase":1,"type":"concept","effort":"deep","title":"References and borrowing","tasks":["Read Rust Book ch.4.2 (References and Borrowing)","Write out the 3 borrowing rules from memory, then check against the book","Write a function with 2 simultaneous immutable borrows + 1 that tries a mutable borrow alongside — watch it fail, understand why"],"resources":[["The Rust Book ch.4.2","https://doc.rust-lang.org/book/ch04-02-references-and-borrowing.html"]]},{"d":5,"phase":1,"type":"build","effort":"deep","title":"KV store skeleton — first real borrow decisions","tasks":["In kv-store, define a `Store` struct wrapping a HashMap<String,String>","Write get(&self), set(&mut self,...), delete(&mut self,...) methods","Hit a real borrow checker conflict (e.g. iterating while mutating) — solve it without clone() first if possible"],"resources":[["The Rust Book ch.8.3 (HashMap)","https://doc.rust-lang.org/book/ch08-03-hash-maps.html"]],"notes":"First time the project teaches you something the exercises couldn't."},{"d":6,"phase":1,"type":"lab","effort":"light","title":"Slices + string vs &str","tasks":["Read Rust Book ch.4.3 (Slices)","Write 5 functions that take &str instead of String and explain why each should","Rustlings: slices1-3, strings1-4"],"resources":[["Rust Book ch.4.3","https://doc.rust-lang.org/book/ch04-03-slices.html"]]},{"d":7,"phase":1,"type":"concept","effort":"deep","title":"Structs + methods","tasks":["Read Rust Book ch.5 (Structs)","Add an impl block to Store with a `len()` and `is_empty()` method","Practice: derive Debug, PartialEq on a small struct and explain what each derive actually generates"],"resources":[["The Rust Book ch.5","https://doc.rust-lang.org/book/ch05-00-structs.html"]]},{"d":8,"phase":1,"type":"concept","effort":"deep","title":"Enums + pattern matching","tasks":["Read Rust Book ch.6 (Enums and Pattern Matching)","Define an enum Command { Get(String), Set(String,String), Delete(String) }","Write a match that handles all variants, then comment out one arm and read the exhaustiveness error"],"resources":[["The Rust Book ch.6","https://doc.rust-lang.org/book/ch06-00-enums.html"]],"notes":"Compare to TS union types — the mapping is close but match's exhaustiveness check is stricter than anything you've had in TS."},{"d":9,"phase":1,"type":"build","effort":"deep","title":"CLI parsing with Command enum","tasks":["Wire stdin input into the Command enum via parsing","Connect Command variants to Store methods — get/set/delete work end-to-end from a REPL loop","Handle malformed input without panicking (return a Result, don't unwrap blindly)"],"resources":[],"notes":"By end of today the KV store is usable interactively, even if fragile."},{"d":10,"phase":1,"type":"concept","effort":"deep","title":"Option and Result properly","tasks":["Read Rust Book ch.9 (Error Handling) fully","Replace any unwrap() in your CLI loop with proper match or ? handling","Write your own function returning Result<T, String> and propagate it with ?"],"resources":[["The Rust Book ch.9","https://doc.rust-lang.org/book/ch09-00-error-handling.html"]],"notes":"Go's `if err != nil` becomes `?` — this should feel familiar, just more enforced."},{"d":11,"phase":1,"type":"lab","effort":"light","title":"Option/Result lab","tasks":["Rustlings: options1-3, errors1-6","Write 3 functions chaining .map(), .and_then(), .unwrap_or() on Option<T> without any if-let"],"resources":[["Rustlings","https://github.com/rust-lang/rustlings"]]},{"d":12,"phase":1,"type":"concept","effort":"deep","title":"Lifetimes — explicit syntax","tasks":["Read Rust Book ch.10.3 (Lifetimes)","Write a function signature that needs an explicit lifetime annotation, then explain in your own words why the compiler can't infer it","Write a struct that holds a &str reference and add the lifetime parameter it requires"],"resources":[["The Rust Book ch.10.3","https://doc.rust-lang.org/book/ch10-03-lifetime-syntax.html"]],"notes":"This is usually the single hardest concept in the book. Budget extra time if it doesn't click in one sitting — that's normal, not a signal you're behind."},{"d":13,"phase":1,"type":"lab","effort":"deep","title":"Lifetimes lab + lifetime elision","tasks":["Rustlings: lifetimes1-3","Read about lifetime elision rules — figure out why most functions don't need explicit lifetimes","Find 3 examples in the standard library docs (e.g. str methods) using explicit lifetimes and explain each"],"resources":[["Lifetime elision — Rust reference","https://doc.rust-lang.org/reference/lifetime-elision.html"]]},{"d":14,"phase":1,"type":"concept","effort":"light","title":"Vec deep dive + iterators intro","tasks":["Read Rust Book ch.8.1 (Vectors) and ch.13.1-13.2 (Iterators intro)","Rewrite a for-loop in your CLI as an iterator chain (.iter().filter().map())","Note 3 places where Rust iterators feel like JS array methods, and 1 place they don't (laziness)"],"resources":[["The Rust Book ch.13","https://doc.rust-lang.org/book/ch13-00-functional-features.html"]]},{"d":15,"phase":1,"type":"build","effort":"deep","title":"Iterators applied to the KV store","tasks":["Add a `keys()` and `values()` method to Store returning iterators, not Vecs, where possible","Add a simple `scan(prefix: &str)` method using iterator chains","Benchmark mentally: where would collecting early cost you vs staying lazy"],"resources":[]},{"d":16,"phase":1,"type":"concept","effort":"deep","title":"Real error types (thiserror)","tasks":["Add thiserror crate, define a StoreError enum replacing the String errors from day 10","Update all Result<T, String> in the codebase to Result<T, StoreError>","Read why anyhow vs thiserror exist for different use cases (library vs application errors)"],"resources":[["thiserror docs","https://docs.rs/thiserror/latest/thiserror/"],["anyhow docs","https://docs.rs/anyhow/latest/anyhow/"]]},{"d":17,"phase":1,"type":"build","effort":"deep","title":"KV store v0.1 — cleanup pass","tasks":["Re-read the entire codebase top to bottom, list every clone() and justify or remove each one","Add doc comments (///) to every public function","Write 5 unit tests covering get/set/delete/scan happy paths"],"resources":[]},{"d":18,"phase":1,"type":"lab","effort":"deep","title":"MILESTONE 1 — review and lock in","tasks":["Run through Milestone 1 criteria checklist (see milestones tab)","Write a 1-paragraph retro: what borrow checker error confused you most this phase, and why it makes sense now","Tag the commit v0.1 in git"],"resources":[],"isMilestone":18},{"d":19,"phase":2,"type":"concept","effort":"deep","title":"Traits — the basics","tasks":["Read Rust Book ch.10.2 (Traits)","Define a trait Greet with a default method, implement it for 2 different structs","Compare explicitly to a TS interface: what a Rust trait can do that a TS interface can't (default methods, blanket impls)"],"resources":[["The Rust Book ch.10.2","https://doc.rust-lang.org/book/ch10-02-traits.html"]]},{"d":20,"phase":2,"type":"concept","effort":"deep","title":"Trait objects vs generics","tasks":["Read about dyn Trait vs impl Trait vs generic <T: Trait>","Write the same function 3 ways: generic, impl Trait param, Box<dyn Trait> param — compare compiled behavior conceptually (monomorphization vs dynamic dispatch)","Write down your own rule of thumb for when you'd reach for each — this directly answers a question you asked Claude before"],"resources":[["Rust Book ch.17.2 (Trait objects)","https://doc.rust-lang.org/book/ch17-02-trait-objects.html"]],"notes":"This is one of the most practically important days in the whole roadmap for writing idiomatic Rust."},{"d":21,"phase":2,"type":"lab","effort":"light","title":"Trait lab","tasks":["Rustlings: traits1-5","Implement a trait for a built-in type (e.g. implement a custom trait for Vec<i32>) to see orphan rule limits in practice"],"resources":[["Rustlings","https://github.com/rust-lang/rustlings"]]},{"d":22,"phase":2,"type":"concept","effort":"deep","title":"Generics + trait bounds","tasks":["Read Rust Book ch.10.1 (Generic Data Types)","Write a generic function with a trait bound using both syntax forms: <T: Trait> and where clause","Refactor one KV store function to be generic over key/value types instead of hardcoded String"],"resources":[["The Rust Book ch.10.1","https://doc.rust-lang.org/book/ch10-01-syntax.html"]]},{"d":23,"phase":2,"type":"concept","effort":"deep","title":"Associated types","tasks":["Read about associated types using the Iterator trait as the canonical example","Write a tiny custom iterator (implement Iterator for a struct) with an associated Item type","Explain in your own words why Iterator uses an associated type instead of a generic parameter"],"resources":[["Rust Book ch.19.3 (Advanced traits)","https://doc.rust-lang.org/book/ch19-03-advanced-traits.html"]]},{"d":24,"phase":2,"type":"lab","effort":"deep","title":"Generics + traits lab","tasks":["Rustlings: generics1-3","Write a generic Cache<K,V> wrapper struct with insert/get, bounded by Eq + Hash on K"],"resources":[]},{"d":25,"phase":2,"type":"concept","effort":"light","title":"Module system","tasks":["Read Rust Book ch.7 (Packages, Crates, Modules)","Split kv-store into modules: store, error, cli, command — one file each","Get pub/pub(crate)/private visibility right on every item"],"resources":[["The Rust Book ch.7","https://doc.rust-lang.org/book/ch07-00-managing-growing-projects-with-packages-crates-and-modules.html"]]},{"d":26,"phase":2,"type":"build","effort":"deep","title":"Restructure KV store as a real crate","tasks":["Separate into lib.rs + bin/main.rs so the store logic is testable as a library","Re-run all tests after the restructure, fix any visibility breaks","Add a workspace Cargo.toml if it feels natural (optional, only if comfortable)"],"resources":[]},{"d":27,"phase":2,"type":"lab","effort":"light","title":"Module lab","tasks":["Read about re-exports (pub use) and write a clean public API surface for your lib.rs","Sketch (on paper or in README) the module dependency graph of your own crate"],"resources":[]},{"d":28,"phase":2,"type":"concept","effort":"deep","title":"Smart pointers — Box, Rc","tasks":["Read Rust Book ch.15.1 (Box) and ch.15.4 (Rc)","Write a small linked-list-like structure using Box<T> to see why const STORAGE_KEY = "rust90_progress_v1";

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { days:{}, milestones:{} };
}
function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
let state = loadState();

function getDayState(d){
  if(!state.days[d]) state.days[d] = { done:false, tasks:{}, note:"" };
  return state.days[d];
}
function getMilestoneState(day){
  if(!state.milestones[day]) state.milestones[day] = { criteria:{} };
  return state.milestones[day];
}

function dayProgress(day){
  const ds = state.days[day.d];
  if(!ds) return 0;
  const total = day.tasks.length;
  if(total === 0) return ds.done ? 1 : 0;
  const checked = day.tasks.filter((_,i)=>ds.tasks[i]).length;
  return checked / total;
}
function isDayDone(day){
  const ds = state.days[day.d];
  return ds ? !!ds.done : false;
}
function findFirstUnfinishedDay(){
  for(const day of DAYS){ if(!isDayDone(day)) return day; }
  return null;
}

function phaseOf(id){ return PHASES.find(p=>p.id===id); }
function phaseColorVar(id){
  return {1:"--p1",2:"--p2",3:"--p3",4:"--p4"}[id];
}

function computeStats(){
  const doneDays = DAYS.filter(isDayDone).length;
  const totalTasks = DAYS.reduce((a,d)=>a+d.tasks.length,0);
  const doneTasks = DAYS.reduce((a,d)=>{
    const ds = state.days[d.d];
    if(!ds) return a;
    return a + d.tasks.filter((_,i)=>ds.tasks[i]).length;
  },0);
  const milestonesDone = MILESTONES.filter(m=>{
    const ms = state.milestones[m.day];
    if(!ms) return false;
    return m.criteria.every((_,i)=>ms.criteria[i]);
  }).length;
  let streak = 0;
  for(let i=DAYS.length-1;i>=0;i--){
    if(isDayDone(DAYS[i])) streak++; else break;
  }
  return { doneDays, totalTasks, doneTasks, milestonesDone, streak };
}

function renderStats(){
  const s = computeStats();
  const pct = Math.round((s.doneDays/90)*100);
  document.getElementById("statsBar").innerHTML = `
    <div class="stat"><div class="stat-num">${s.doneDays}<span style="font-size:14px;color:var(--text-faint)">/90</span></div><div class="stat-label">Ngày hoàn thành</div></div>
    <div class="stat"><div class="stat-num">${pct}%</div><div class="stat-label">Tổng tiến trình</div></div>
    <div class="stat"><div class="stat-num">${s.milestonesDone}<span style="font-size:14px;color:var(--text-faint)">/4</span></div><div class="stat-label">Milestones</div></div>
    <div class="stat"><div class="stat-num">${s.streak}</div><div class="stat-label">Streak liên tiếp</div></div>
  `;
}

function renderPhaseBar(){
  const bar = document.getElementById("phaseBar");
  const labels = document.getElementById("phaseLabels");
  bar.innerHTML = "";
  labels.innerHTML = "";
  PHASES.forEach(p=>{
    const phaseDays = DAYS.filter(d=>d.phase===p.id);
    const done = phaseDays.filter(isDayDone).length;
    const pct = Math.round((done/phaseDays.length)*100);
    const seg = document.createElement("div");
    seg.className = "phaseseg";
    seg.innerHTML = `<div class="phaseseg-fill" style="width:${pct}%;background:var(${phaseColorVar(p.id)})"></div>`;
    seg.title = `${p.name}: ${done}/${phaseDays.length}`;
    bar.appendChild(seg);
    const lbl = document.createElement("span");
    lbl.textContent = `P${p.id} ${pct}%`;
    labels.appendChild(lbl);
  });
}

function taskCheckboxHTML(day, idx, label){
  const ds = getDayState(day.d);
  const checked = !!ds.tasks[idx];
  return `<li class="taskitem ${checked?'checked':''}">
    <input type="checkbox" data-day="${day.d}" data-task="${idx}" ${checked?'checked':''}>
    <label for="t-${day.d}-${idx}">${label}</label>
  </li>`;
}

function renderResourceLinks(res){
  if(!res || res.length===0) return "";
  return `<div class="dayres">${res.map(r=>`<a href="${r[1]}" target="_blank" rel="noopener">${r[0]}</a>`).join("")}</div>`;
}

function dayCardHTML(day, opts={}){
  const ds = getDayState(day.d);
  const done = !!ds.done;
  const milestone = !!day.isMilestone;
  const isToday = opts.today;
  const phase = phaseOf(day.phase);
  return `
  <div class="daycard ${done?'done':''} ${milestone?'milestone':''} ${isToday?'today':''}" data-daycard="${day.d}">
    ${milestone?`<div class="milestone-tag"><i class="ti ti-flag" aria-hidden="true"></i> Milestone day</div>`:""}
    <div class="daycard-top">
      <div class="daycard-meta">
        <span class="daynum">Ngày ${day.d}</span>
        <span class="daytype ${day.type}">${day.type}</span>
        <span class="dayeffort">${day.effort==='deep'?'~1.5-3h':'~30-45p'}</span>
      </div>
      <button class="checkbtn ${done?'checked':''}" data-toggle-day="${day.d}" aria-label="Đánh dấu hoàn thành ngày ${day.d}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>
      </button>
    </div>
    <h3 class="daytitle">${day.title}</h3>
    <ul class="tasklist">
      ${day.tasks.map((t,i)=>taskCheckboxHTML(day,i,t)).join("")}
    </ul>
    ${day.notes?`<div class="daynotes">${day.notes}</div>`:""}
    ${renderResourceLinks(day.resources)}
    <textarea class="notefield" placeholder="Ghi chú cá nhân cho ngày này..." data-noteday="${day.d}">${ds.note||""}</textarea>
  </div>`;
}

let currentFilter = "all";

function renderToday(){
  const container = document.getElementById("viewToday");
  const next = findFirstUnfinishedDay();
  if(!next){
    container.innerHTML = `<div class="emptystate"><i class="ti ti-trophy" aria-hidden="true"></i>Đã hoàn thành tất cả 90 ngày. Capstone xong rồi.</div>`;
    return;
  }
  const idx = DAYS.findIndex(d=>d.d===next.d);
  const upcoming = DAYS.slice(idx, idx+3);
  container.innerHTML = `
    <div class="daylist">
      ${upcoming.map((d,i)=>dayCardHTML(d,{today:i===0})).join("")}
    </div>
  `;
  attachDayCardEvents(container);
}

function renderAll(){
  const container = document.getElementById("viewAll");
  let filtered = DAYS;
  if(currentFilter !== "all"){
    filtered = DAYS.filter(d => String(d.phase) === currentFilter);
  }
  container.innerHTML = `
    <div class="filters">
      <button class="filter-btn ${currentFilter==='all'?'active':''}" data-filter="all">Tất cả</button>
      ${PHASES.map(p=>`<button class="filter-btn ${currentFilter===String(p.id)?'active':''}" data-filter="${p.id}">P${p.id} — ${p.name}</button>`).join("")}
    </div>
    <div class="daylist">
      ${filtered.map(d=>dayCardHTML(d)).join("")}
    </div>
  `;
  container.querySelectorAll(".filter-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      currentFilter = btn.dataset.filter;
      renderAll();
    });
  });
  attachDayCardEvents(container);
}

function renderMilestones(){
  const container = document.getElementById("viewMilestones");
  container.innerHTML = MILESTONES.map(m=>{
    const ms = getMilestoneState(m.day);
    const phase = phaseOf(m.phase);
    return `
    <div class="mscard">
      <div class="mscard-day">Ngày ${m.day} &middot; ${phase.name}</div>
      <div class="mscard-title">${m.title}</div>
      <ul class="mscriteria">
        ${m.criteria.map((c,i)=>{
          const checked = !!ms.criteria[i];
          return `<li class="${checked?'checked':''}">
            <input type="checkbox" data-msday="${m.day}" data-mscrit="${i}" ${checked?'checked':''}>
            <label>${c}</label>
          </li>`;
        }).join("")}
      </ul>
    </div>`;
  }).join("");

  container.querySelectorAll("input[data-msday]").forEach(cb=>{
    cb.addEventListener("change", ()=>{
      const day = cb.dataset.msday;
      const idx = cb.dataset.mscrit;
      const ms = getMilestoneState(day);
      ms.criteria[idx] = cb.checked;
      saveState();
      renderMilestones();
      renderStats();
    });
  });
}

function renderResources(){
  const container = document.getElementById("viewResources");
  container.innerHTML = RESOURCES.map(group=>`
    <div class="rescat">
      <h3>${group.cat}</h3>
      <ul class="reslist">
        ${group.items.map(([name,url,tag])=>`
          <li>${url?`<a href="${url}" target="_blank" rel="noopener">${name}</a>`:name}<span class="restag">${tag}</span></li>
        `).join("")}
      </ul>
    </div>
  `).join("");
}

function attachDayCardEvents(container){
  container.querySelectorAll("[data-toggle-day]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const day = btn.dataset.toggleDay;
      const ds = getDayState(day);
      ds.done = !ds.done;
      if(ds.done){
        const dayObj = DAYS.find(d=>String(d.d)===String(day));
        dayObj.tasks.forEach((_,i)=>{ ds.tasks[i] = true; });
      }
      saveState();
      renderAllViews();
    });
  });
  container.querySelectorAll("input[type=checkbox][data-day]").forEach(cb=>{
    cb.addEventListener("change", ()=>{
      const day = cb.dataset.day;
      const idx = cb.dataset.task;
      const ds = getDayState(day);
      ds.tasks[idx] = cb.checked;
      const dayObj = DAYS.find(d=>String(d.d)===String(day));
      const allChecked = dayObj.tasks.every((_,i)=>ds.tasks[i]);
      if(allChecked && !ds.done){ ds.done = true; }
      if(!allChecked && ds.done){ ds.done = false; }
      saveState();
      renderAllViews();
    });
  });
  container.querySelectorAll(".notefield").forEach(ta=>{
    ta.addEventListener("input", ()=>{
      const day = ta.dataset.noteday;
      const ds = getDayState(day);
      ds.note = ta.value;
      saveState();
    });
  });
}

function renderAllViews(){
  renderStats();
  renderPhaseBar();
  const activeTab = document.querySelector(".tab.active").dataset.tab;
  if(activeTab === "today") renderToday();
  if(activeTab === "all") renderAll();
  if(activeTab === "milestones") renderMilestones();
}

document.querySelectorAll(".tab").forEach(tab=>{
  tab.addEventListener("click", ()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById("viewToday").style.display = "none";
    document.getElementById("viewAll").style.display = "none";
    document.getElementById("viewMilestones").style.display = "none";
    document.getElementById("viewResources").style.display = "none";
    const view = document.getElementById("view" + tab.dataset.tab.charAt(0).toUpperCase() + tab.dataset.tab.slice(1));
    view.style.display = "block";
    if(tab.dataset.tab==="today") renderToday();
    if(tab.dataset.tab==="all") renderAll();
    if(tab.dataset.tab==="milestones") renderMilestones();
    if(tab.dataset.tab==="resources") renderResources();
  });
});

document.getElementById("exportBtn").addEventListener("click", ()=>{
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "rust90-progress-" + new Date().toISOString().slice(0,10) + ".json";
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById("importBtn").addEventListener("click", ()=>{
  document.getElementById("importFile").click();
});
document.getElementById("importFile").addEventListener("change", (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const parsed = JSON.parse(reader.result);
      state = parsed;
      saveState();
      renderAllViews();
      alert("Đã nhập tiến trình thành công.");
    }catch(err){
      alert("File không hợp lệ.");
    }
  };
  reader.readAsText(file);
});

document.getElementById("resetBtn").addEventListener("click", ()=>{
  if(confirm("Reset toàn bộ tiến trình? Hành động này không thể hoàn tác. Nên xuất dữ liệu trước nếu chưa chắc.")){
    state = { days:{}, milestones:{} };
    saveState();
    renderAllViews();
  }
});

// init
renderStats();
renderPhaseBar();
renderToday();
